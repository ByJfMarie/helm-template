# Fichier d'exemple — copier en secrets.yaml et chiffrer avec SOPS :
#   sops --encrypt secrets.yaml > secrets.enc.yaml
#
# Déploiement local :
#   helm secrets install my-app ./ -f values.yaml -f secrets.enc.yaml
#
# Ce fichier ne doit JAMAIS être commité non chiffré.

backend:
  image:
    env:
      - name: DB_PASSWORD
        valueEncrypt: "changeme"
      - name: SECRET_KEY
        valueEncrypt: "changeme"
      - name: SMTP_PASSWORD
        valueEncrypt: "changeme"

database:
  postgres:
    initdb:
      password: "changeme"
      passwordSuperUser: "changeme"
  mariadb:
    rootPassword: "changeme"
    users:
      - name: myuser
        password: "changeme"
        passwordSecretName: mariadb-myuser-password
        database: mydb
        host: "%"
        privileges: "SELECT, INSERT, UPDATE, DELETE"
  redis:
    redisPassword: "changeme"
  mysql:
    credentials:
      rootPassword: "changeme"
