name: network

# IngressClass to use — set to "traefik-internal" for internal-only access
ingressClassName: "traefik"

# Traefik namespace where shared middlewares (https-redirect) live
traefikNamespace: "traefik"

tls:
  enabled: false
  # letsencryptEnv: staging | prod
  letsencryptEnv: "staging"
  secretName: ""
  commonName: example.com
  dnsNames:
    - example.com

traefik:
  domain: example.com
  # ingressClass: sélectionne l'instance Traefik via annotation traefik.io/ingress.class
  #   ""                 → traefik-public (classe par défaut, pas d'annotation)
  #   "traefik-internal" → traefik-internal (accès LAN uniquement)
  ingressClass: ""
  routes: []
