{{- if .Values.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.name }}-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "network.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.tls.secretName | default (printf "%s-tls" .Values.name) }}
  issuerRef:
    {{- if eq .Values.tls.letsencryptEnv "prod" }}
    name: letsencrypt-prod
    {{- else }}
    name: letsencrypt-staging
    {{- end }}
    kind: ClusterIssuer
  commonName: {{ .Values.tls.commonName }}
  dnsNames:
    {{- range .Values.tls.dnsNames }}
    - {{ . | quote }}
    {{- end }}
{{- end }}
